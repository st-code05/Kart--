<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./stylle.css">
    <title>Document</title>
</head>
<body>


        <div class="container">
        <h1>Responsive Pricing Tables</h1>
      
        <div class="pricing">
          <div class="plan basic">
            <h2>Basic</h2>
            <p><b>10GB</b> Storage</p>
            <p>10 Emails</p>
            <p>10 Domains</p>
            <p><b>Endless</b> Support</p>
            <h3>$10</h3>
            <p>per month</p>
            <button>Sign Up</button>
          </div>
      
          <div class="plan pro">
            <h2>Pro</h2>
            <p><b>25GB</b> Storage</p>
            <p>25 Emails</p>
            <p>25 Domains</p>
            <p><b>Endless</b> Support</p>
            <h3>$25</h3>
            <p>per month</p>
            <button>Sign Up</button>
          </div>
      
          <div class="plan premium">
            <h2>Premium</h2>
            <p><b>50GB</b> Storage</p>
            <p>50 Emails</p>
            <p>50 Domains</p>
            <p><b>Endless</b> Support</p>
            <h3>$50</h3>
            <p>per month</p>
            <button>Sign Up</button>
          </div>
        </div>
      </div>
    
</body>
</html>
